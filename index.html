<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Lernpfad Quadratische Gleichungen</title>
<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  min-height:100vh;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  background:#fff;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  width:980px;
  display:flex;
  gap:20px;
}
.levelNav{
  width:150px;
  background:#f7f7f7;
  border-radius:12px;
  padding:12px;
  font-size:14px;
}
.levelNav h4{margin:0 0 10px 0;}
.levelItem{
  background:white;
  border-radius:9px;
  padding:9px;
  margin:7px 0;
  cursor:pointer;
  box-shadow:0 2px 5px rgba(0,0,0,.12);
  font-weight:600;
}
.levelItem:hover{background:#eef7ff;transform:scale(1.02);}
.levelItem.active{background:#d7ecff;border:2px solid #1e88e5;}
.levelItem.done::after{content:' ✓';color:#1b5e20;font-weight:bold;}
.modeBox{
  margin-top:16px;
  background:#333;
  color:white;
  border-radius:10px;
  padding:11px;
  text-align:center;
  cursor:pointer;
  font-weight:700;
  box-shadow:0 2px 5px rgba(0,0,0,.18);
}
.modeBox:hover{transform:scale(1.02);background:#1e88e5;}
.left{flex:2;}
.right{
  flex:1;
  background:#f7f7f7;
  padding:12px;
  border-radius:12px;
  font-size:14px;
  display:none;
}
.progress{
  height:10px;
  background:#eee;
  border-radius:10px;
  margin-bottom:15px;
  overflow:hidden;
}
.progress-bar{
  height:100%;
  background:#4CAF50;
  width:0%;
  transition:width .3s;
}
.math{
  font-family:monospace;
  background:#f7f7f7;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  line-height:1.8;
}
.eqline{
  display:flex;
  justify-content:space-between;
  gap:18px;
}
.operation{color:#555;white-space:nowrap;}
.prompt{font-weight:bold;margin:10px 0 8px;}
.sqrtExpression{display:inline-flex;align-items:flex-start;gap:3px;vertical-align:middle;}
.sqrtSymbol{font-size:2.2em;line-height:.85;transform:scaleY(1.25);display:inline-block;}
.sqrtRadicand{border-top:2px solid #333;padding:4px 8px 0;display:inline-block;min-height:1.4em;}
button{
  width:100%;
  margin:6px 0;
  padding:11px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:15px;
  transition:.15s;
}
button:hover{transform:scale(1.02);}
.restart,.darkBtn{background:#333;color:white;}
.feedback{color:#c62828;font-weight:bold;margin-top:10px;}
.specialHint{color:#c62828;font-weight:bold;font-size:18px;margin:12px 0;}
.inputArea{background:#fff8e1;padding:12px;border-radius:10px;margin-top:10px;}
input{box-sizing:border-box;width:100%;padding:9px;border:1px solid #ccc;border-radius:8px;margin:6px 0;}
.descItem{margin:8px 0;}
.smallHint{color:#666;font-size:13px;}
.finishBig{font-size:30px;font-weight:bold;text-align:center;margin:18px 0;color:#1b5e20;}
.worksheet{background:#fff;padding:14px;border-radius:14px;}
.worksheetTitle{font-size:24px;margin-bottom:15px;}
.pieces{position:relative;height:420px;background:#fafafa;border-radius:12px;padding:10px;overflow:hidden;}
.piece{position:absolute;padding:11px 14px;border-radius:6px;font-size:20px;font-weight:600;box-shadow:0 3px 8px rgba(0,0,0,.22);transform:rotate(var(--rot));white-space:nowrap;}
.orange{background:#ffc46b;left:20px;top:22px;}
.blue{background:#69c8ec;left:250px;top:28px;}
.green{background:#b9df78;left:490px;top:34px;}
.yellow{background:#ffd95f;left:25px;top:180px;font-size:18px;}
.red{background:#ff8b84;left:25px;top:250px;font-size:18px;}
.gray{background:#cfdce5;left:25px;top:320px;font-size:18px;}
.bubble,.letterBubble{display:inline-block;background:#fff;border-radius:50%;padding:4px 10px;margin-right:8px;}
.letterBubble{background:#1e88e5;color:white;margin-left:10px;margin-right:0;}
.matchRow{display:flex;align-items:center;gap:8px;margin:10px 0;font-size:18px;}
.matchRow input{width:80px;margin:0;}
.success{color:#1b5e20;font-weight:bold;margin-top:10px;}
</style>
</head>

function setBackground(mode){
  document.body.style.background = mode==="practice" ? "linear-gradient(135deg,#ffe082,#ffb74d)" : "linear-gradient(135deg,#4facfe,#00f2fe)";
}
function setModeBox(){
  const box=document.getElementById("modeBox");
  if(currentMode==="practice"){
    box.innerText="Erarbeitungsmodus";
    box.onclick=backToLearningMode;
  }else{
    box.innerText="Übungsmodus";
    box.onclick=openPracticePassword;
  }
}
function openPracticePassword(){
  currentMode="practice";
  setBackground("practice");
  setModeBox();
  reviewMode=true;
  failed=false;
  document.getElementById("rightPanel").style.display="none";
  document.getElementById("levelTitle").innerText="Übungsmodus";
  document.getElementById("bar").style.width="0%";
  document.getElementById("history").innerHTML=`
    <div class='worksheet'>
      <div class='worksheetTitle'>Passwort eingeben</div>
      <p>Gib das Passwort ein, um den Übungsmodus zu öffnen.</p>
    </div>
  `;
  document.getElementById("buttons").innerHTML=`
    <div class='inputArea'>
      <input id='practicePassword' type='password'>
      <button class='darkBtn' onclick='checkPracticePassword()'>Öffnen</button>
      <div id='practiceFeedback'></div>
    </div>
  `;
  renderLevelNav();
}
function checkPracticePassword(){
  const value=document.getElementById("practicePassword").value.trim();
  const feedback=document.getElementById("practiceFeedback");
  if(value==="55"){
    showPracticePage();
  }else{
    feedback.innerHTML=`<div class='feedback'>Das Passwort stimmt noch nicht. Probiere es nochmal.</div>`;
  }
}
function showPracticePage(){
  currentMode="practice";
  setBackground("practice");
  setModeBox();
  reviewMode=true;
  failed=false;
  document.getElementById("rightPanel").style.display="none";
  document.getElementById("levelTitle").innerText="Übungsmodus";
  document.getElementById("bar").style.width="0%";
  document.getElementById("history").innerHTML=`
    <div class='worksheet'>
      <div class='worksheetTitle'>Übungsmodus</div>
      <p style='font-size:20px;font-weight:bold;'>Buch Seite 151/152</p>
      <p>Wähle eine Aufgabe aus. Für jede richtige Teilaufgabe bekommst du einen Stern. Für eine teilweise richtige Teilaufgabe bekommst du einen halben Stern.</p>
      <div style='display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:15px;'>
        ${practiceTile(1)}
        ${practiceTile(2)}
        ${practiceTile(4)}
        ${practiceTile(10)}
        ${lockedPracticeTile(12)}
      </div>
    </div>
  `;
  document.getElementById("buttons").innerHTML="";
  renderLevelNav();
}

function allMainPracticeStarsCollected(){
  const required=["1_e","1_f","1_g","1_h","2_a","2_d","2_g","4_a","4_b","10_a","10_b","10_c"];
  return required.every(key=>completedPracticeSubtasks.has(key));
}

function getPracticeLabels(n){
  if(n===1)return ["e","f","g","h"];
  if(n===2)return ["a","d","g"];
  if(n===4)return ["a","b"];
  if(n===10)return ["a","b","c"];
  return [];
}

function practiceTile(n){
  const labels=getPracticeLabels(n);
  const stars=labels.map(label=>{
    const key=`${n}_${label}`;
    if(completedPracticeSubtasks.has(key))return "⭐";
    if(partialPracticeSubtasks.has(key))return "★½";
    return "☆";
  }).join(" ");

function normalizeAnswer(value){
  return value
    .toLowerCase()
    .replaceAll(" ","")
    .replaceAll(",",".")
    .replaceAll("wurzel","√")
    .replaceAll("sqrt","√")
    .replaceAll("(","")
    .replaceAll(")","");
}

function savePracticeInputs(n,label,count){
  for(let i=1;i<=count;i++){
    const el=document.getElementById(`practice_${label}_${i}`);
    if(el)practiceAnswers[`${n}_${label}_${i}`]=el.value;
  }
}

function scorePair(label,acceptedPairs){
  const v1=normalizeAnswer(document.getElementById(`practice_${label}_1`).value.trim());
  const v2=normalizeAnswer(document.getElementById(`practice_${label}_2`).value.trim());

  return acceptedPairs.reduce((best,pair)=>{
    const a=normalizeAnswer(pair[0]);
    const b=normalizeAnswer(pair[1]);

    if(b===""){
      const okSingle=(v1===a&&v2==="")||(v2===a&&v1==="");
      return Math.max(best,okSingle?1:0);
    }

    const full=(v1===a&&v2===b)||(v1===b&&v2===a);
    const half=(v1===a||v1===b||v2===a||v2===b);
    return Math.max(best,full?1:(half?0.5:0));
  },0);
}

function scorePoints(label,acceptedPairs){
  const values=[1,2,3,4].map(i=>normalizeAnswer(document.getElementById(`practice_${label}_${i}`).value.trim()));
  return acceptedPairs.reduce((best,pair)=>{
    const p1=[normalizeAnswer(pair[0][0]),normalizeAnswer(pair[0][1])];
    const p2=[normalizeAnswer(pair[1][0]),normalizeAnswer(pair[1][1])];
    const entered1=[values[0],values[1]];
    const entered2=[values[2],values[3]];
    const firstMatchesP1=entered1[0]===p1[0]&&entered1[1]===p1[1];
    const firstMatchesP2=entered1[0]===p2[0]&&entered1[1]===p2[1];
    const secondMatchesP1=entered2[0]===p1[0]&&entered2[1]===p1[1];
    const secondMatchesP2=entered2[0]===p2[0]&&entered2[1]===p2[1];
    const full=(firstMatchesP1&&secondMatchesP2)||(firstMatchesP2&&secondMatchesP1);
    const half=firstMatchesP1||firstMatchesP2||secondMatchesP1||secondMatchesP2;
    return Math.max(best,full?1:(half?0.5:0));
  },0);
}

function updatePracticeStar(n,label,score){
  const key=`${n}_${label}`;
  if(score===1){
    completedPracticeSubtasks.add(key);
    partialPracticeSubtasks.delete(key);
  }else if(score===0.5){
    if(!completedPracticeSubtasks.has(key))partialPracticeSubtasks.add(key);
  }else{
    if(!completedPracticeSubtasks.has(key))partialPracticeSubtasks.delete(key);
  }
}

function checkPracticeTask(n){
  const solutions={
    1:{
      e:[["2,3",""]],
      f:[["6/5","-2/5"]],
      g:[["keine lösung",""]],
      h:[["5/4","-7/4"]]
    },
    2:{
      a:[["2","-18"]],
      d:[["-3","-9"]],
      g:[["0","-1"]]
    },
    10:{
      a:[["1/5","-3/5"]],
      b:[["7+√8","7-√8"],["√8+7","-√8+7"],["7+√(8)","7-√(8)"],["√(8)+7","-√(8)+7"],["7+wurzel(8)","7-wurzel(8)"],["wurzel(8)+7","-wurzel(8)+7"]],
      c:[["-1,5",""]]
    }
  };

  let allCorrect=true;
  let feedback="";

  if(n===4){
    const pointSolutions={
      a:[[["1","9"],["-5","9"]]],
      b:[[["5,5","13"],["-2,5","13"]]]
    };

    Object.keys(pointSolutions).forEach(label=>{
      savePracticeInputs(n,label,4);
      const score=scorePoints(label,pointSolutions[label]);
      updatePracticeStar(n,label,score);
      if(score===1){
        feedback+=`<div class='success'>${label}) richtig ⭐</div>`;
      }else if(score===0.5){
        allCorrect=false;
        feedback+=`<div class='success'>${label}) teilweise richtig ★½</div>`;
      }else{
        allCorrect=false;
        feedback+=`<div class='feedback'>${label}) noch nicht richtig</div>`;
      }
    });
  }else{
    const task=solutions[n];
    Object.keys(task).forEach(label=>{
      savePracticeInputs(n,label,2);
      const score=scorePair(label,task[label]);
      updatePracticeStar(n,label,score);
      if(score===1){
        feedback+=`<div class='success'>${label}) richtig ⭐</div>`;
      }else if(score===0.5){
        allCorrect=false;
        feedback+=`<div class='success'>${label}) teilweise richtig ★½</div>`;
      }else{
        allCorrect=false;
        feedback+=`<div class='feedback'>${label}) noch nicht richtig</div>`;
      }
    });
  }

  if(allCorrect){
    feedback+=`<div class='success' style='font-size:20px;margin-top:10px;'>Aufgabe ${n} vollständig geschafft ⭐</div>`;
  }
  if(allMainPracticeStarsCollected()&&!extraPracticeUnlocked){
    extraPracticeUnlocked=true;
    feedback+=`<div class='success' style='font-size:20px;margin-top:10px;'>Alle bisherigen Sterne gesammelt! Die Bonuskacheln sind jetzt freigeschaltet ✨</div>`;
  }
  document.getElementById("practiceTaskFeedback").innerHTML=feedback;
}

function renderLevelNav(){
  setModeBox();
  const nav=document.getElementById("levelNavList");
  let html="";

  let highestUnlocked=0;
  if(completedLevels.size>0){
    highestUnlocked=Math.min(Math.max(...Array.from(completedLevels))+1,levels.length-1);
  }

  for(let i=0;i<=highestUnlocked;i++){
    const done=completedLevels.has(i);
    const active=currentMode==="learning" && i===levelIndex;
    html+=`<div class='levelItem ${done?'done':''} ${active?'active':''}' onclick='jumpToLevel(${i})'>Level ${i+1}</div>`;
  }

  if(level9Completed || completedLevels.has(levels.length-1)){
    html+=`<div class='levelItem ${level9Completed?'done':''} ${currentMode==='level9'?'active':''}' onclick='jumpToLevel(8)'>Level 9</div>`;

  }

  nav.innerHTML=html || "Noch kein Level geschafft.";
}

function jumpToLevel(index){
  if(index===8 && (level9Completed || completedLevels.has(levels.length-1))){
    showLevel9();
    return;
  }

  if(index===9 && (level10Completed || level9Completed)){
    showLevel10();
    return;
  }

  let highestUnlocked=0;
  if(completedLevels.size>0){
    highestUnlocked=Math.min(Math.max(...Array.from(completedLevels))+1,levels.length-1);
  }

  if(index<0 || index>highestUnlocked)return;

  currentMode="learning";
  setBackground("learning");
  setModeBox();
  levelIndex=index;
  stepIndex=0;
  failed=false;
  reviewMode=false;
  history=[{eq:levels[levelIndex].steps[0].eq,op:null}];
  renderLevelNav();
  render();
}

function choose(option){
  if(failed||reviewMode)return;
  const current=levels[levelIndex].steps[stepIndex];
  const result=option.correct?current.result:option.result;
  history[history.length-1].op=option.text;
  history.push({eq:result,op:null});
  renderHistory();
  renderDescriptions();
  updateProgress();

  if(option.correct){
    if(levels[levelIndex].collectDescriptions && !descriptions[stepIndex]){
      askDescription();
    }else{
      stepIndex++;
      render();
    }
  }else{
    failed=true;
    showWrong(option.msg);
  }
}

  document.getElementById("buttons").innerHTML=`<div class='feedback'>${msg||"Nicht zielführend."}</div><button class='restart' onclick='resetLevel()'>Neustart</button>`;

  currentMode="learning";

  const current=currentLevel.steps[stepIndex];
  document.getElementById("levelTitle").innerText=currentLevel.title;

    level9Completed=true;
    renderLevelNav();
    fb.innerHTML=`<div class='success'>Richtig! Sehr gut zugeordnet 🎉</div><button class='darkBtn' onclick='showLevel10()'>Weiter zu Level 10</button><button class='restart' onclick='restartGame()'>Nochmal spielen</button>`;
  }else{
    fb.innerHTML=`<div class='feedback'>Noch nicht richtig. Probiere es nochmal.</div>`;
  }
}

function showLevel10(){
  currentMode="level10";
  reviewMode=true;
  document.getElementById("levelTitle").innerText="Level 10 - Graphische Bedeutung erkennen.";
  document.getElementById("bar").style.width="100%";
  document.getElementById("rightPanel").style.display="none";
  document.getElementById("history").innerHTML=`<div class='worksheet'><div class='worksheetTitle'>Was beschreibt die Gleichung</div><div style='font-size:24px;font-weight:bold;text-align:center;margin:16px 0;'>3·(x+2)² - 27 = 4</div><div style='font-size:20px;text-align:center;'>graphisch?</div></div>`;
  document.getElementById("buttons").innerHTML=`<div class='prompt'>Wähle die passende Beschreibung aus.</div><button onclick='checkLevel10(false)'>a) Schnittpunkt von einer Normalparabel und einer konstanten Funktion</button><button onclick='checkLevel10(false)'>b) Schnittpunkt von zwei linearen Funktionen</button><button onclick='checkLevel10(false)'>c) Schnittpunkt einer gestreckten Normalparabel und einer linearen Funktion</button><button onclick='checkLevel10(true)'>d) Schnittpunkt einer quadratischen Funktion und einer konstanten Funktion</button><div id='level10Feedback'></div>`;
  renderLevelNav();
}

function checkLevel10(correct){
  const fb=document.getElementById("level10Feedback");
  if(correct){
    level10Completed=true;
    renderLevelNav();
    fb.innerHTML=`<div class='success'>Richtig! Links steht eine quadratische Funktion, rechts eine konstante Funktion.</div><button class='darkBtn' onclick='showFinalCongrats()'>Fertig</button><button class='restart' onclick='restartGame()'>Nochmal spielen</button>`;
  }else{
    fb.innerHTML=`<div class='feedback'>Noch nicht richtig. Probiere es nochmal.</div>`;
  }
}

function showFinalCongrats(){
  currentMode="final";
  setBackground("learning");
  document.getElementById("levelTitle").innerText="Fertig 🎉";
  document.getElementById("bar").style.width="100%";
  document.getElementById("rightPanel").style.display="none";
  document.getElementById("history").innerHTML=`<div class='worksheet'><div style='font-size:30px;font-weight:bold;text-align:center;margin:12px 0;color:#1b5e20;'>Herzlichen Glückwunsch!</div><div style='font-size:22px;text-align:center;line-height:1.5;'>Du hast erstmal alle Level geschafft.<br>Du bist besonders gut und schnell!</div></div>`;
  document.getElementById("buttons").innerHTML=`<button class='restart' onclick='restartGame()'>Nochmal spielen</button>`;
  renderLevelNav();
}

resetLevel();
</script>
</body>
</html>
