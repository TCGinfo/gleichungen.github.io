function level(title,collectDescriptions,steps){return{title,collectDescriptions,steps}}
function step(eq,correctOp,result,wrongs){return{eq,correctOp,result,wrongs}}
function wrong(op,result,msg){return{op,result,msg}}
function sqrtHTML(expression,negative=false){return `<span class='sqrtExpression'><span class='sqrtSymbol'>${negative?"-√":"√"}</span><span class='sqrtRadicand'>${expression}</span></span>`}
function rootEquation(equation){const parts=equation.split("=");const left=parts[0].trim();const right=parts[1]?parts[1].trim():"0";return `${sqrtHTML(left)} = ${right} oder ${sqrtHTML(left,true)} = ${right}`}
function shuffle(array){const copy=[...array];for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy}
function resetLevel(){stepIndex=0;failed=false;reviewMode=false;history=[{eq:levels[levelIndex].steps[0].eq,op:null}];renderLevelNav();render()}
function renderLevelNav(){const nav=document.getElementById("levelNavList");let html="";for(let i=0;i<levels.length;i++){if(completedLevels.has(i)){html+=`<div class='levelItem done ${i===levelIndex?'active':''}' onclick='jumpToLevel(${i})'>Level ${i+1}</div>`}}if(level9Completed){html+=`<div class='levelItem done' onclick='jumpToLevel(8)'>Level 9</div>`}nav.innerHTML=html||"Noch kein Level geschafft."}
function jumpToLevel(index){if(index===8&&level9Completed){showLevel9();return}if(!completedLevels.has(index))return;levelIndex=index;stepIndex=0;failed=false;reviewMode=false;history=[{eq:levels[levelIndex].steps[0].eq,op:null}];renderLevelNav();render()}
function choose(option){if(failed||reviewMode)return;const current=levels[levelIndex].steps[stepIndex];const result=option.correct?current.result:option.result;history[history.length-1].op=option.text;history.push({eq:result,op:null});renderHistory();renderDescriptions();updateProgress();if(option.correct){if(levels[levelIndex].collectDescriptions&&!descriptions[stepIndex]){askDescription()}else{stepIndex++;render()}}else{failed=true;showWrong(option.msg)}}
function showWrong(msg){document.getElementById("buttons").innerHTML=`<div class='feedback'>${msg||"Nicht zielführend."}</div><button class='restart' onclick='resetLevel()'>Neustart</button>`}
function askDescription(){document.getElementById("buttons").innerHTML=`<div class='inputArea'><p><b>Wie würdest du diesen Schritt beschreiben?</b></p><input id='inputDesc'><button class='darkBtn' onclick='saveDescription()'>Übernehmen</button></div>`}
function saveDescription(){const input=document.getElementById("inputDesc");const value=input.value.trim()||defaultDescriptions[stepIndex]||"Schritt beschreiben";descriptions[stepIndex]=value;stepIndex++;render()}
function renderHistory(){let html="";history.forEach(item=>{html+=`<div class='eqline'><span>${item.eq}</span><span class='operation'>${item.op?"| "+item.op:""}</span></div>`});document.getElementById("history").innerHTML=html}
function renderDescriptions(){const panel=document.getElementById("rightPanel"),desc=document.getElementById("desc");if(levelIndex===0&&descriptions.length===0){panel.style.display="none";desc.innerHTML="";return}panel.style.display="block";if(descriptions.length===0){desc.innerHTML=`<p class='smallHint'>Ab Level 2 sammelst du hier deine Beschreibungen.</p>`;return}desc.innerHTML=descriptions.map((d,i)=>d?`<div class='descItem'>${i+1}. ${d}</div>`:"").join("")}
function updateProgress(){const total=(levelIndex<levels.length)?levels[levelIndex].steps.length:1;document.getElementById("bar").style.width=Math.min((stepIndex/total)*100,100)+"%"}
function render(){renderHistory();renderDescriptions();updateProgress();const currentLevel=levels[levelIndex];const current=currentLevel.steps[stepIndex];document.getElementById("levelTitle").innerText=currentLevel.title;const buttons=document.getElementById("buttons");buttons.innerHTML="";if(stepIndex>=currentLevel.steps.length){showLevelReview();return}buttons.innerHTML=`<div class='prompt'>Welche Äquivalenzumformung soll durchgeführt werden?</div>`;const options=shuffle([{text:current.correctOp,correct:true},...current.wrongs.map(w=>({text:w.op,correct:false,result:w.result,msg:w.msg}))]);options.forEach(o=>{const b=document.createElement("button");b.innerText=o.text;b.onclick=()=>choose(o);buttons.appendChild(b)})}
function showLevelReview(){reviewMode=true;completedLevels.add(levelIndex);renderLevelNav();document.getElementById("bar").style.width="100%";
if(levelIndex===4&&!worksheetGateShown){worksheetGateShown=true;document.getElementById("history").innerHTML=`<div style="font-size:26px;font-weight:bold;text-align:center;margin:10px 0;">Alle Level geschafft 🎉</div><div class="finishBig">Fülle nun das Arbeitsblatt aus</div>`;document.getElementById("buttons").innerHTML=`<button class='restart' onclick='location.reload()'>Nochmal spielen</button><button class='darkBtn' onclick='startLevel6()'>Arbeitsblatt ist ausgefüllt</button>`;return}
if(levelIndex===7){document.getElementById("buttons").innerHTML=`<div class='feedback'>Achtung: Das ist ein besonderer Fall mit nur einer Lösung.</div><button class='darkBtn' onclick='continueAfterReview()'>Weiter</button>`;return}
if(levelIndex>=5){document.getElementById("buttons").innerHTML=`<button class='darkBtn' onclick='continueAfterReview()'>Weiter</button>`;return}
if(levelIndex>=1){document.getElementById("buttons").innerHTML=`<div class='inputArea'><p><b>Passt die Beschreibung rechts noch oder möchtest du sie ändern?</b></p><button class='darkBtn' onclick='continueAfterReview()'>Passt so</button><button onclick='editDescriptions()'>Beschreibung ändern</button></div>`}else{document.getElementById("buttons").innerHTML=`<button class='darkBtn' onclick='nextLevel()'>Nächstes Level</button>`}}
function startLevel6(){levelIndex=5;stepIndex=0;failed=false;reviewMode=false;history=[{eq:levels[levelIndex].steps[0].eq,op:null}];renderLevelNav();render()}
function editDescriptions(){const values=descriptions.length?descriptions:defaultDescriptions;let inputs="";for(let i=0;i<4;i++){inputs+=`<label>${i+1}.<input id='edit${i}' value='${values[i]||""}'></label>`}document.getElementById("buttons").innerHTML=`<div class='inputArea'><p><b>Ändere deine Beschreibung:</b></p>${inputs}<button class='darkBtn' onclick='saveEditedDescriptions()'>Speichern und weiter</button></div>`}
function saveEditedDescriptions(){descriptions=[];for(let i=0;i<4;i++){const value=document.getElementById("edit"+i).value.trim();descriptions[i]=value||defaultDescriptions[i]}renderDescriptions();continueAfterReview()}
function continueAfterReview(){if(levelIndex>=levels.length-1){showLevel9();return}nextLevel()}
function nextLevel(){levelIndex++;stepIndex=0;failed=false;reviewMode=false;history=[{eq:levels[levelIndex].steps[0].eq,op:null}];renderLevelNav();render()}
function showLevel9(){reviewMode=true;document.getElementById("levelTitle").innerText="Level 9 - Ordne jeder Gleichung ihre Lösungen zu.";document.getElementById("bar").style.width="100%";document.getElementById("rightPanel").style.display="none";document.getElementById("history").innerHTML=`<div class='worksheet'><div class='worksheetTitle'>7 a) ☒ Ordne jeder Gleichung ihre Lösungen zu.</div><div class='pieces'><div class='piece orange' style='--rot:3deg'>(x − 7)² = 7 <span class='letterBubble'>A</span></div><div class='piece blue' style='--rot:-3deg'>(x + 7)² = 7 <span class='letterBubble'>B</span></div><div class='piece green' style='--rot:-3deg'>(x − √7)² = 7 <span class='letterBubble'>C</span></div><div class='piece yellow' style='--rot:0deg'><span class='bubble'>1</span>x₁ = √7 − 7; x₂ = −√7 − 7</div><div class='piece red' style='--rot:3deg'><span class='bubble'>2</span>x₁ = √7 + 7; x₂ = −√7 + 7</div><div class='piece gray' style='--rot:-3deg'><span class='bubble'>3</span>x₁ = 2 · √7; x₂ = 0</div></div></div>`;document.getElementById("buttons").innerHTML=`<div class='inputArea'><div class='matchRow'><label>A -</label><input id='ansA'></div><div class='matchRow'><label>B -</label><input id='ansB'></div><div class='matchRow'><label>C -</label><input id='ansC'></div><button class='darkBtn' onclick='checkLevel9()'>Prüfen</button><div id='matchFeedback'></div></div>`}
function checkLevel9(){const a=document.getElementById("ansA").value.trim(),b=document.getElementById("ansB").value.trim(),c=document.getElementById("ansC").value.trim();const fb=document.getElementById("matchFeedback");if(a==="2"&&b==="1"&&c==="3"){level9Completed=true;renderLevelNav();fb.innerHTML=`<div class='success'>Richtig! Sehr gut zugeordnet 🎉</div><button class='restart' onclick='location.reload()'>Nochmal spielen</button>`}else{fb.innerHTML=`<div class='feedback'>Noch nicht richtig. Probiere es nochmal.</div>`}}
resetLevel();
</script>
